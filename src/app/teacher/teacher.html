<div class="h-screen bg-gray-50 flex flex-col font-sans overflow-hidden">

  <div class="flex-none z-60 w-full bg-white shadow-md border-b border-gray-100">
    <app-teacher-header [currentUser]="currentUser" [isSidebarOpen]="isSidebarOpen"
      [exercises]="contextService.exercises()" [activeExerciseId]="contextService.selectedExercise()?.exerciseId"
      [showSearch]="isSearchBarVisible" (exerciseSelected)="contextService.selectExercise($event)"
      (toggleSidebar)="onToggleSidebar()" (logout)="onLogout()" (studentFound)="onStudentFound($event)"
      class="block w-full">
    </app-teacher-header>
  </div>

  <div class="flex flex-1 overflow-hidden w-full max-w-[2048px] mx-auto">

    <div *ngIf="isSidebarOpen" (click)="isSidebarOpen = false"
      class="fixed inset-0 z-40 md:hidden bg-white/10 backdrop-blur-sm cursor-pointer">
    </div>

    <app-teacher-sidebar [currentUser]="currentUser" [(isSidebarOpen)]="isSidebarOpen" [sidebarButtons]="sidebarButtons"
      [showSearch]="isSearchBarVisible" (logout)="onLogout()" (buttonClick)="onSidebarButtonClick($event)"
      (studentSelected)="onStudentFound($event)" [activeView]="activeView"
      class="flex-shrink-0 z-50 h-full bg-gray-900 transition-all duration-300 ease-in-out"
      [ngClass]="isSidebarOpen ? 'w-64' : 'w-0 md:w-64'">
    </app-teacher-sidebar>

    <main class="flex-1 overflow-y-auto bg-gray-50 p-4 md:p-8 w-full min-w-0">

      <div class="bg-white p-4 md:p-10 rounded-2xl shadow-xl min-h-[calc(100vh-8rem)] border border-gray-100">

        <ng-container *ngIf="activeView === 'Bloky'"><app-blocks></app-blocks></ng-container>
        <ng-container *ngIf="activeView === 'Zadania'"><app-assignments></app-assignments></ng-container>
        <ng-container *ngIf="activeView === 'Cvičenia'"><app-exercises></app-exercises></ng-container>
        <ng-container *ngIf="activeView === 'Používatelia'"><app-users></app-users></ng-container>
        <ng-container *ngIf="activeView === 'Študenti'"><app-students></app-students></ng-container>
        <ng-container *ngIf="activeView === 'Nahrávanie'"><app-student-upload></app-student-upload></ng-container>
        <ng-container *ngIf="activeView === 'Dochádzka'"><app-attendance></app-attendance></ng-container>
        <ng-container *ngIf="activeView === 'Hodnotenie'"><app-grading></app-grading></ng-container>
        <ng-container *ngIf="activeView === 'Záznamy'"><app-logs></app-logs></ng-container>
        <ng-container *ngIf="activeView === 'Suplovanie'"><app-substitution></app-substitution></ng-container>

        <ng-container *ngIf="activeView === 'default'">
          <div class="space-y-6">
            <h2 class="text-3xl font-extrabold text-gray-800 border-b pb-2 border-emerald-500/50">
              👋 Vitajte v Administrácii
            </h2>
            <p class="text-lg text-gray-600">
              Vyberte si položku z menu vľavo pre správu obsahu.
            </p>
          </div>
        </ng-container>

      </div>
    </main>
  </div>
</div>
<ng-container *ngIf="selectedStudent">
  <app-search-bar-modal [student]="selectedStudent" (close)="onModalClose()">
  </app-search-bar-modal>
</ng-container>
