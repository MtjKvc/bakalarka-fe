<div class="min-h-screen bg-gray-50 flex flex-col font-sans">
  <div class="max-w-[2048px] mx-auto w-full flex-grow flex flex-col">

    <div class="bg-white shadow-xl sticky top-0 z-40 transition-all duration-300 border-b border-gray-100">
        <app-teacher-header 
          [currentUser]="currentUser" 
          [isSidebarOpen]="isSidebarOpen" 
          (toggleSidebar)="onToggleSidebar()"
          (logout)="onLogout()" 
          (searchSubmit)="onSearchSubmit($event)" 
          (searchIconClick)="onSearchIconClick()"
          class="block"> </app-teacher-header>
    </div>

    <div class="flex-grow flex relative">

      <div *ngIf="isSidebarOpen" (click)="isSidebarOpen = false"
        class="fixed inset-0 bg-gray-900 bg-opacity-60 z-20 md:hidden transition-opacity duration-300">
      </div>

      <app-teacher-sidebar 
        [currentUser]="currentUser" 
        [isSidebarOpen]="isSidebarOpen" 
        [sidebarButtons]="sidebarButtons"
        (logout)="onLogout()" 
        (buttonClick)="onSidebarButtonClick($event)"
        [activeView]="activeView" 
        class="bg-gray-800 text-white md:flex-shrink-0">
      </app-teacher-sidebar>

      <main class="flex-grow bg-gray-50 p-4 md:p-8 transition-all duration-300">

        <div class="bg-white p-6 md:p-10 rounded-2xl shadow-xl min-h-full border border-gray-100">

          <ng-container *ngIf="activeView === 'blocks'">
            <app-blocks></app-blocks>
          </ng-container>

          <ng-container *ngIf="activeView === 'assigments'">
            <app-assignments></app-assignments>
          </ng-container>

          <ng-container *ngIf="activeView === 'default'">
            <div class="space-y-6">
              <h2 class="text-3xl font-extrabold text-gray-800 border-b pb-2 border-emerald-500/50">
                👋 Vitajte v Administrácii
              </h2>
              <p class="text-lg text-gray-600">
                Vyberte si položku z menu vľavo pre správu obsahu.
              </p>
            </div>
          </ng-container>

          <ng-container *ngIf="activeView !== 'default' && activeView !== 'blocks' && activeView !== 'assigments'">
            <h2 class="text-3xl font-extrabold text-gray-800 mb-6 border-b pb-2 border-gray-300">
              Pohľad: <span class="text-emerald-600">{{ activeView | titlecase }}</span>
            </h2>
            <p class="text-gray-700 text-lg">
              Komponent pre "<span class="font-bold text-gray-800">{{ activeView }}</span>" ešte nie je implementovaný.
            </p>
          </ng-container>

        </div>

      </main>

    </div>

  </div> 
</div>
