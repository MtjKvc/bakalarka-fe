<aside class="h-full flex flex-col bg-gray-900 text-white overflow-hidden shadow-2xl">

  <div class="p-4 border-b border-gray-800 flex justify-between items-center flex-shrink-0 h-16">
    <span class="font-bold text-xl tracking-wider">MENU</span>
    <button (click)="isSidebarOpen = false" class="md:hidden text-gray-400 hover:text-white">
    </button>
  </div>

  <div class="flex-1 overflow-y-auto p-4 space-y-2 min-h-0 custom-scrollbar">

    <div class="md:hidden mb-6 pb-4 border-b border-gray-800" *ngIf="showSearch">
      <p class="text-xs text-gray-400 font-bold uppercase mb-2">Vyhľadať študenta</p>
      <app-search-bar (studentSelected)="studentSelected.emit($event)"></app-search-bar>
    </div>

    <button *ngFor="let button of sidebarButtons" (click)="buttonClick.emit(button.label)"
      class="w-full py-3 px-4 rounded-lg text-left font-medium transition-all duration-200"
      [hidden]="!shouldShowButton(button)" [disabled]="!shouldShowButton(button)" [ngClass]="{ 
          'text-gray-400 hover:bg-gray-800 hover:text-white': button.label !== activeView,
          'bg-emerald-600 text-white shadow-lg': button.label === activeView
      }">
      {{ button.label }}
    </button>
  </div>

  <div class="p-4 border-t border-gray-800 bg-gray-900 flex-shrink-0 mt-auto">
    <div class="mb-4 px-2" *ngIf="currentUser">
      <p class="font-medium text-white">{{ currentUser.meno }}</p>
      <p class="text-xs text-gray-500">{{ currentUser.rola }}</p>
    </div>

    <button (click)="openPasswordModal()"
      class="w-full bg-gray-800 hover:bg-gray-700 text-white py-2 px-4 rounded-lg shadow transition mb-2 border border-gray-700">
      Zmeniť heslo
    </button>

    <button (click)="logout.emit()"
      class="w-full bg-red-600 hover:bg-red-700 text-white py-2 px-4 rounded-lg shadow transition">
      Odhlásiť sa
    </button>
  </div>

</aside>

<div *ngIf="isPasswordModalOpen" (click)="closePasswordModal()" class="teacher-modal-bg">
  <div class="teacher-modal" (click)="$event.stopPropagation()" (appCloseOnEsc)="closePasswordModal()">
    <div class="p-8">
      <h3 class="modal-title">Zmena hesla</h3>
      
      <div *ngIf="passwordError" class="error-message mb-4">{{ passwordError }}</div>
      <div *ngIf="passwordSuccess" class="mb-4 p-3 rounded bg-emerald-50 text-emerald-700 text-sm border border-emerald-200">
        {{ passwordSuccess }}
      </div>

      <form #passwordForm="ngForm" (ngSubmit)="submitPasswordChange()">
        <div class="space-y-4">
          
          <div>
            <label class="modal-label">Staré heslo</label>
            <div class="relative">
              <input 
                name="oldPassword" 
                [type]="showOldPassword ? 'text' : 'password'" 
                [(ngModel)]="oldPassword" 
                required 
                #oldPwdInput="ngModel"
                class="modal-input pr-10" 
                placeholder="********"
                [class.modal-input-wrong]="oldPwdInput.invalid && (oldPwdInput.dirty || oldPwdInput.touched)">
              
              <button type="button" (click)="showOldPassword = !showOldPassword" class="absolute inset-y-0 right-0 pr-3 flex items-center text-gray-400 hover:text-gray-600 focus:outline-none">
                <svg *ngIf="!showOldPassword" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z" />
                  <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                </svg>
                <svg *ngIf="showOldPassword" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 001.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.45 10.45 0 0112 4.5c4.756 0 8.773 3.162 10.065 7.498a10.523 10.523 0 01-4.293 5.774M6.228 6.228L3 3m3.228 3.228l3.65 3.65m7.894 7.894L21 21m-3.228-3.228l-3.65-3.65m0 0a3 3 0 10-4.243-4.243m4.242 4.242L9.88 9.88" />
                </svg>
              </button>
            </div>
            <div *ngIf="oldPwdInput.invalid && (oldPwdInput.dirty || oldPwdInput.touched)" class="modal-input-wrong-text">
              <span *ngIf="oldPwdInput.errors?.['required']">Staré heslo je povinné.</span>
            </div>
          </div>

          <hr class="border-gray-200 my-4">

          <div>
            <label class="modal-label">Nové heslo</label>
            <div class="relative">
              <input 
                name="newPassword" 
                [type]="showNewPassword ? 'text' : 'password'" 
                [(ngModel)]="newPassword" 
                required 
                minlength="8"
                #newPwdInput="ngModel"
                class="modal-input pr-10" 
                placeholder="********"
                [class.modal-input-wrong]="(newPwdInput.invalid && (newPwdInput.dirty || newPwdInput.touched)) || (oldPassword && newPassword && oldPassword === newPassword)">
                
              <button type="button" (click)="showNewPassword = !showNewPassword" class="absolute inset-y-0 right-0 pr-3 flex items-center text-gray-400 hover:text-gray-600 focus:outline-none">
                <svg *ngIf="!showNewPassword" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z" />
                  <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                </svg>
                <svg *ngIf="showNewPassword" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 001.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.45 10.45 0 0112 4.5c4.756 0 8.773 3.162 10.065 7.498a10.523 10.523 0 01-4.293 5.774M6.228 6.228L3 3m3.228 3.228l3.65 3.65m7.894 7.894L21 21m-3.228-3.228l-3.65-3.65m0 0a3 3 0 10-4.243-4.243m4.242 4.242L9.88 9.88" />
                </svg>
              </button>
            </div>
            <div *ngIf="newPwdInput.invalid && (newPwdInput.dirty || newPwdInput.touched)" class="modal-input-wrong-text">
              <span *ngIf="newPwdInput.errors?.['required']">Nové heslo je povinné.</span>
              <span *ngIf="newPwdInput.errors?.['minlength']">Heslo musí mať aspoň 8 znakov.</span>
            </div>
            <div *ngIf="oldPassword && newPassword && oldPassword === newPassword" class="modal-input-wrong-text">
              Nové heslo nemôže byť rovnaké ako staré!
            </div>
          </div>

          <div>
            <label class="modal-label">Zopakujte nové heslo</label>
            <div class="relative">
              <input 
                name="newPasswordConfirm" 
                [type]="showConfirmPassword ? 'text' : 'password'" 
                [(ngModel)]="newPasswordConfirm" 
                required 
                #confirmPwdInput="ngModel"
                class="modal-input pr-10" 
                placeholder="********"
                [class.modal-input-wrong]="(confirmPwdInput.invalid && (confirmPwdInput.dirty || confirmPwdInput.touched)) || (newPasswordConfirm && newPassword !== newPasswordConfirm)">
                
              <button type="button" (click)="showConfirmPassword = !showConfirmPassword" class="absolute inset-y-0 right-0 pr-3 flex items-center text-gray-400 hover:text-gray-600 focus:outline-none">
                <svg *ngIf="!showConfirmPassword" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z" />
                  <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                </svg>
                <svg *ngIf="showConfirmPassword" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 001.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.45 10.45 0 0112 4.5c4.756 0 8.773 3.162 10.065 7.498a10.523 10.523 0 01-4.293 5.774M6.228 6.228L3 3m3.228 3.228l3.65 3.65m7.894 7.894L21 21m-3.228-3.228l-3.65-3.65m0 0a3 3 0 10-4.243-4.243m4.242 4.242L9.88 9.88" />
                </svg>
              </button>
            </div>
            <div *ngIf="confirmPwdInput.invalid && (confirmPwdInput.dirty || confirmPwdInput.touched)" class="modal-input-wrong-text">
              <span *ngIf="confirmPwdInput.errors?.['required']">Potvrdenie hesla je povinné.</span>
            </div>
            <div *ngIf="newPasswordConfirm && newPassword !== newPasswordConfirm" class="modal-input-wrong-text">
              Heslá sa nezhodujú!
            </div>
          </div>

        </div>

        <div class="modal-button-layout mt-8">
          <button type="button" (click)="closePasswordModal()" class="close-button" [disabled]="isSubmitting">
            Zrušiť
          </button>
          <button 
            type="submit" 
            [disabled]="isSubmitting || passwordForm.invalid || newPassword !== newPasswordConfirm || (oldPassword && newPassword && oldPassword === newPassword)"
            class="green-button flex items-center justify-center">
            
            <svg *ngIf="isSubmitting" class="animate-spin -ml-1 mr-2 h-4 w-4 text-white inline-block" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
            
            {{ isSubmitting ? 'Ukladám...' : 'Uložiť' }}
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
