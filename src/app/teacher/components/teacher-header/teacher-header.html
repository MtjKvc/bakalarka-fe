<header class="bg-white text-gray-800 p-3 md:p-4 flex items-center justify-between shadow-lg sticky top-0 z-40 border-b border-gray-100">
  
  <div class="flex items-center">
    <button 
      (click)="onToggleSidebar()" 
      class="text-gray-500 hover:text-emerald-600 md:hidden mr-3 p-1 rounded-full transition duration-150 ease-in-out"
    >
      <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
    </button>
    <div class="text-2xl font-extrabold text-gray-900 tracking-tight flex items-center">
      Architektúra počítačov
    </div>
  </div>

  <div class="flex items-center space-x-3 mx-6">
    @for (ex of exercises(); track ex.exerciseId) {
      <button 
        (click)="onExerciseClick(ex)"
        class="flex flex-col items-center justify-center px-4 py-1.5 rounded-lg border transition-all duration-200 shadow-sm"
        [ngClass]="{
          'bg-emerald-600 text-white border-emerald-600 shadow-md ring-2 ring-emerald-100': activeExerciseId() === ex.exerciseId,
          'bg-white text-gray-600 border-gray-200 hover:border-emerald-400 hover:text-emerald-600 hover:bg-emerald-50': activeExerciseId() !== ex.exerciseId
        }"
      >
        <span class="text-[10px] uppercase tracking-wider font-semibold opacity-90 leading-none mb-0.5">
          {{ ex.sessionDay }}
        </span>
        <span class="text-sm font-bold leading-none">
          {{ ex.startTime }}
        </span>
      </button>
    }
  </div>

  <div class="hidden md:flex-grow md:block mx-8 max-w-xl">
    <div class="relative">
      <input 
        type="text" 
        placeholder="Vyhľadať..." 
        class="w-full pl-10 pr-4 py-2 bg-gray-50 border border-gray-300 rounded-lg shadow-inner text-gray-700
               focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 transition duration-150"
        (keyup.enter)="onSearchSubmit($event)"
      >
      <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
        <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
      </div>
    </div>
  </div>

  <div class="flex items-center space-x-4">
    
    <button (click)="onSearchIconClick()" class="text-gray-500 hover:text-emerald-600 md:hidden p-1 rounded-full transition duration-150 ease-in-out">
      <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
    </button>

    <div class="hidden md:flex items-center space-x-6">
      <div class="text-right flex flex-col justify-center">
        <p class="font-semibold text-gray-800">{{ currentUser().meno }}</p>
        <p class="text-xs text-gray-500">{{ currentUser().rola | titlecase }}</p>
      </div>

      <button 
        (click)="onLogoutClick()"
        class="bg-emerald-600 hover:bg-emerald-700 text-white font-medium py-2 px-4 rounded-lg 
               focus:outline-none focus:ring-4 focus:ring-emerald-500 focus:ring-opacity-50 
               transition duration-150 ease-in-out shadow-md hover:shadow-lg"
      >
        Odhlásiť sa
      </button>
    </div>
  </div>
</header>
